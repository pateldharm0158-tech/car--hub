<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Details</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

<div id="carDetailsPage" class="max-w-7xl mx-auto p-6">

  <div class="grid lg:grid-cols-3 gap-6">

    <div class="lg:col-span-2">

      <img id="main-image"
      class="w-full rounded-3xl shadow-lg">

      <div id="thumbnail-grid"
      class="flex gap-3 mt-4 overflow-x-auto">
      </div>

    </div>

    <div class="bg-white p-6 rounded-3xl shadow-lg">

      <h1 id="car-name"
      class="text-3xl font-bold mb-4">
      </h1>

      <h2 id="car-price"
      class="text-red-600 text-4xl font-bold">
      </h2>

    </div>

  </div>

</div>


<script src="script.js"></script>
  <script>
window.addEventListener("load", function(){

const params = new URLSearchParams(window.location.search);

const carId = Number(params.get("id"));

const car = cars.find(c => c.id === carId);

if(!car){
alert("Car not found");
return;
}

document.getElementById("main-image").src = car.images[0];

document.getElementById("car-name").textContent = car.name;

document.getElementById("car-price").textContent = car.price;

document.getElementById("thumbnail-grid").innerHTML =
car.images.map(img => `
<img src="${img}"
class="w-24 h-20 object-cover rounded-xl cursor-pointer"
onclick="document.getElementById('main-image').src='${img}'">
`).join('');

});
</script>

</body>
</html>
