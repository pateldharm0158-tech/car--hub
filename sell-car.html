<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sell Your Car - Magneto Carsz</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-4">

<div class="bg-red-700 text-white rounded-3xl p-8 mb-8">

<p class="uppercase font-bold tracking-widest">
MAGNETO CARSZ
</p>

<h1 class="text-5xl font-bold mt-2">
Sell Your Car
</h1>

<p class="mt-4 text-lg">
Share your vehicle details and our team will contact you.
</p>

</div>
<form class="bg-white p-8 rounded-3xl shadow">

<div class="grid md:grid-cols-2 gap-6">

<div>
<label class="font-bold">Your Name *</label>
<input type="text"
class="w-full border p-4 rounded-xl mt-2"
placeholder="Enter your full name">
</div>

<div>
<label class="font-bold">Mobile Number *</label>
<input type="tel"
class="w-full border p-4 rounded-xl mt-2"
placeholder="Enter mobile number">
</div>

<div>
<label class="font-bold">WhatsApp Number *</label>
<input type="tel"
class="w-full border p-4 rounded-xl mt-2"
placeholder="Enter WhatsApp number">
</div>

<div>
<label class="font-bold">City *</label>
<input type="text"
class="w-full border p-4 rounded-xl mt-2"
placeholder="Enter city">
</div>

<div>
<label class="font-bold">Registration Number *</label>
<input type="text"
class="w-full border p-4 rounded-xl mt-2"
placeholder="GJ05AB1234">
</div>

<div>
<label class="font-bold">State *</label>
<select class="w-full border p-4 rounded-xl mt-2">
<option>Choose State</option>
<option>Gujarat</option>
<option>Maharashtra</option>
<option>Delhi</option>
</select>
</div>

<div>
<label class="font-bold">Manufacturing Year *</label>
<select class="w-full border p-4 rounded-xl mt-2">
<option>Choose Year</option>
</select>
</div>

<div>
<label class="font-bold">Registration Year *</label>
<select class="w-full border p-4 rounded-xl mt-2">
<option>Choose Year</option>
</select>
</div>

<div>
<label class="font-bold">Owner Type *</label>
<select class="w-full border p-4 rounded-xl mt-2">
<option>1st Owner</option>
<option>2nd Owner</option>
<option>3rd Owner</option>
</select>
</div>

<div>
<label class="font-bold">Brand *</label>
<select class="w-full border p-4 rounded-xl mt-2">
<option>Choose Brand</option>
<option>Hyundai</option>
<option>Mahindra</option>
<option>Toyota</option>
<option>BMW</option>
</select>
</div>

<div>
<label class="font-bold">Model Name *</label>
<input type="text"
class="w-full border p-4 rounded-xl mt-2">
</div>

<div>
<label class="font-bold">Variant *</label>
<input type="text"
class="w-full border p-4 rounded-xl mt-2">
</div>

<div>
<label class="font-bold">Driven (KM) *</label>
<input type="text"
class="w-full border p-4 rounded-xl mt-2">
</div>

<div>
<label class="font-bold">Fuel Type *</label>
<select class="w-full border p-4 rounded-xl mt-2">
<option>Petrol</option>
<option>Diesel</option>
<option>CNG</option>
<option>Electric</option>
</select>
</div>

<div>
<label class="font-bold">Transmission *</label>
<select class="w-full border p-4 rounded-xl mt-2">
<option>Manual</option>
<option>Automatic</option>
</select>
</div>

</div>

<div class="mt-6">
<label class="font-bold">Expected Price *</label>
<input type="text"
class="w-full border p-4 rounded-xl mt-2"
placeholder="₹">
</div>

<button
class="w-full mt-8 bg-black text-white py-5 rounded-full font-bold text-xl">
SUBMIT DETAILS
</button>

</form>
</div>
</body>
</html>
