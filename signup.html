<!DOCTYPE html>
<html>
<head>
<title>Signup - Magneto Carsz</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-xl w-96">

<h1 class="text-3xl font-bold mb-6 text-center">
Signup
</h1>

<input id="email" type="email" placeholder="Email"
class="border w-full p-3 mb-4 rounded">

<input id="password" type="password" placeholder="Password"
class="border w-full p-3 mb-4 rounded">

<button id="signupBtn"
class="bg-red-600 text-white w-full p-3 rounded">
Create Account
</button>

<p class="mt-4 text-center">
Already have account?
<a href="login.html" class="text-red-600">
Login
</a>
</p>

</div>

<script type="module">

import {
auth,
createUserWithEmailAndPassword
} from "./firebase.js";

document.getElementById("signupBtn")
.addEventListener("click",()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{

alert("Signup Successful");

window.location="login.html";

})
.catch(error=>alert(error.message));

});

</script>

</body>
</html>
