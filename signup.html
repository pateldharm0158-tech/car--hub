<!DOCTYPE html>
<html>
<head>
<title>Signup - Magneto Carsz</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<video autoplay muted loop playsinline class="bg-video">
  <source src="BMW.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="signup-container">
<a href="index.html" class="close-btn">✕</a>
  
<h1 class="text-4xl font-bold mb-6 text-center text-white">
Signup
</h1>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="signupBtn">
Create Account
</button>

<p class="mt-4 text-center text-white">
Already have account?
<a href="login.html" class="text-red-500">
Login
</a>
</p>

</div>
  <script type="module">

import {
auth,
createUserWithEmailAndPassword
} from "./firebase.js";

document.getElementById("signupBtn")
.addEventListener("click",()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{

showPopup("Signup Successful");
  
window.location="login.html";

})
.catch(error=>alert(error.message));

});

</script>

</body>
</html>
